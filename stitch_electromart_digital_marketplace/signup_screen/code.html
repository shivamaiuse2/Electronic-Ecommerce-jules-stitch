<!-- Header -->

</header>
<!-- Signup Form -->
<section class="flex flex-col gap-gutter-md">
<!-- Full Name -->
<div class="flex flex-col gap-stack-sm">

<input class="bg-transparent border-none outline-none flex-1 text-on-surface placeholder:text-outline/50 p-0 focus:ring-0" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email -->
<div class="flex flex-col gap-stack-sm">
<label class="text-label-bold font-label-bold text-primary uppercase tracking-wider px-1">Email Address</label>
<div class="flex items-center gap-3 bg-surface-container-low p-4 rounded-lg border border-outline-variant/30 input-focus-effect transition-all">
<span class="material-symbols-outlined text-outline" data-icon="mail">mail</span>
<input class="bg-transparent border-none outline-none flex-1 text-on-surface placeholder:text-outline/50 p-0 focus:ring-0" placeholder="john@example.com" type="email"/>
</div>
</div>
<!-- Phone Number -->

<label class="text-label-bold font-label-bold text-primary uppercase tracking-wider px-1">Phone Number</label>

<span class="material-symbols-outlined text-outline" data-icon="call">call</span>
<input class="bg-transparent border-none outline-none flex-1 text-on-surface placeholder:text-outline/50 p-0 focus:ring-0" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<!-- Password -->

<label class="text-label-bold font-label-bold text-primary uppercase tracking-wider px-1">Password</label>
<div class="flex items-center gap-3 bg-surface-container-low p-4 rounded-lg border border-outline-variant/30 input-focus-effect transition-all">
<span class="material-symbols-outlined text-outline" data-icon="lock">lock</span>
<input class="bg-transparent border-none outline-none flex-1 text-on-surface placeholder:text-outline/50 p-0 focus:ring-0" placeholder="••••••••" type="password"/>
<button class="text-outline hover:text-on-surface transition-colors">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>

</div>
</div>

<!-- Floating Atmosphere Elements -->
<div class="fixed bottom-0 left-0 w-full h-1/3 bg-gradient-to-t from-background to-transparent pointer-events-none -z-10"></div>
<script>
        // Simple micro-interaction for button hover
        const primaryBtn = document.querySelector('button.bg-primary');
        primaryBtn.addEventListener('mousemove', (e) => {
            const { left, top, width, height } = primaryBtn.getBoundingClientRect();
            const x = (e.clientX - left) / width;
            const y = (e.clientY - top) / height;
            primaryBtn.style.transform = `scale(1.02) translateY(-2px)`;
        });
        primaryBtn.addEventListener('mouseleave', () => {
            primaryBtn.style.transform = '';
        });

        // Add subtle focus ring effects to all inputs
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            const parent = input.parentElement;
            input.addEventListener('focus', () => {
                parent.classList.add('border-primary/50');
            });
            input.addEventListener('blur', () => {
                parent.classList.remove('border-primary/50');
            });
        });
    </script>
