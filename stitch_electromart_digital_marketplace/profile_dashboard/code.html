<!-- Edit Profile -->

<div class="flex justify-between w-full">

<span class="text-label-bold-mobile font-label-bold-mobile">Profile</span>
</button>

<script>
        // Simple haptic-like feedback for buttons
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('click', () => {
                if (window.navigator.vibrate) {
                    window.navigator.vibrate(10);
                }
            });
        });

        // Dynamic header background on scroll
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 20) {
                header.classList.add('shadow-md');
                header.classList.replace('bg-surface/80', 'bg-surface/95');
            } else {
                header.classList.remove('shadow-md');
                header.classList.replace('bg-surface/95', 'bg-surface/80');
            }
        });
    </script>
