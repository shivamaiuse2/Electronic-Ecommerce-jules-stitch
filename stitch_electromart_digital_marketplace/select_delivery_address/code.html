<script>
        // Micro-interactions for address selection
        document.querySelectorAll('.address-card-radio').forEach(radio => {
            radio.addEventListener('change', (e) => {
                // Add a subtle ripple or scale effect if desired
                if (e.target.checked) {
                    const card = e.target.nextElementSibling;
                    card.style.transform = 'scale(1.02)';
                    setTimeout(() => {
                        card.style.transform = 'scale(1)';
                    }, 150);
                }
            });
        });

        // Toggle map overlay visibility on scroll
        const main = document.querySelector('main');
        window.addEventListener('scroll', () => {
            const scrollPos = window.scrollY;
            const map = document.querySelector('[data-location]');
            if (map) {
                map.style.opacity = 1 - (scrollPos / 300);
            }
        });
