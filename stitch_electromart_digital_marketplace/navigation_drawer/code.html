<!-- Micro-interactions Overlay -->
<div class="fixed inset-0 bg-black/40 z-10 transition-opacity duration-300 opacity-100" id="drawer-overlay"></div>
<script>
    // Subtle tilt effect for the background preview on mouse move
    const mainContent = document.querySelector('main');
    document.addEventListener('mousemove', (e) => {
      const x = (window.innerWidth / 2 - e.pageX) / 50;
      const y = (window.innerHeight / 2 - e.pageY) / 50;
      mainContent.style.transform = `translateX(15%) rotateY(${-10 + x}deg) rotateX(${y}deg) scale(0.9)`;
    });

    // Touch feedback for nav items
    const navItems = document.querySelectorAll('nav a, button');
    navItems.forEach(item => {
      item.addEventListener('touchstart', () => {
        item.style.transform = 'scale(0.97)';
      });
      item.addEventListener('touchend', () => {
        item.style.transform = 'scale(1)';
      });
    });
  </script>
