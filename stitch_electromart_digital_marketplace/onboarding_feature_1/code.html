<div class="h-1.5 w-8 rounded-full bg-primary transition-all duration-300"></div>
<div class="h-1.5 w-1.5 rounded-full bg-outline-variant"></div>
<div class="h-1.5 w-1.5 rounded-full bg-outline-variant"></div>
</div>
<!-- Primary Action Button -->

<!-- Subtle Glow effect -->
<div class="absolute -inset-1 bg-primary/40 rounded-full blur opacity-25 group-hover:opacity-50 transition duration-1000 group-hover:duration-200"></div>
<button class="relative w-full h-16 bg-primary text-on-primary font-headline-md text-headline-md rounded-full flex items-center justify-center gap-3 hover:scale-[1.02] active:scale-95 transition-all shadow-lg shadow-primary/20" onclick="handleNext()">
                        Next
                        <span class="material-symbols-outlined font-bold">arrow_forward</span>
</button>
</div>
</div>

<!-- Dynamic Micro-interactions -->
<script>
            function handleNext() {
                // Subtle ripple effect or navigation logic would go here
                const btn = document.querySelector('button');
                btn.classList.add('opacity-80');
                setTimeout(() => {
                    btn.classList.remove('opacity-80');
                    // Logical navigation placeholder
                    console.log("Navigating to next screen...");
                }, 150);
            }

            // Simple parallax on scroll or subtle mouse move (emulated)
            document.addEventListener('mousemove', (e) => {
                const moveX = (e.clientX - window.innerWidth / 2) / 50;
                const moveY = (e.clientY - window.innerHeight / 2) / 50;
                const hero = document.querySelector('.animate-float');
                if (hero) {
                    hero.style.transform = `translate(${moveX}px, ${moveY}px)`;
                }
            });
        </script>
