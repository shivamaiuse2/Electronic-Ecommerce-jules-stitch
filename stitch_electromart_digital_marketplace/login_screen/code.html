<style>
        body {

<body class="font-body-lg overflow-x-hidden min-h-screen">
<!-- Atmospheric Background -->

<p class="text-on-surface-variant font-body-sm mt-2">Welcome back to the future of sound and light.</p>

<!-- Login Form -->

</div>
<input class="w-full h-14 bg-surface-container-low border border-outline-variant/30 rounded-lg pl-12 pr-4 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-on-surface placeholder:text-outline/50" placeholder="name@email.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-stack-sm">
<div class="flex justify-between items-center px-1">
<label class="text-label-bold-mobile font-label-bold-mobile text-on-surface-variant uppercase tracking-widest">Password</label>
<a class="text-primary font-label-bold-mobile hover:opacity-80 transition-opacity" href="#">Forgot Password?</a>
</div>
<div class="relative group input-group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors input-icon">lock</span>
</div>
<input class="w-full h-14 bg-surface-container-low border border-outline-variant/30 rounded-lg pl-12 pr-12 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-on-surface placeholder:text-outline/50" placeholder="••••••••" type="password"/>
<div class="absolute inset-y-0 right-0 pr-4 flex items-center">
<button class="text-outline hover:text-primary transition-colors">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-16 bg-primary text-on-primary font-bold text-headline-md-mobile rounded-lg shadow-lg shadow-primary/10 hover:opacity-90 active:scale-95 transition-all mt-4 tap-scale">
                    Sign In
                </button>
</section>
<!-- Divider -->
<div class="relative flex items-center py-section-gap">
<div class="flex-grow border-t border-outline-variant/20"></div>
<span class="flex-shrink mx-4 text-on-surface-variant font-label-bold-mobile uppercase">Or continue with</span>
<div class="flex-grow border-t border-outline-variant/20"></div>

<div class="mt-auto pt-12 text-center">

<div class="relative z-10 text-center px-8">
<span class="material-symbols-outlined text-primary text-4xl mb-2">bolt</span>
<p class="text-on-surface font-label-bold-mobile tracking-[0.2em]">POWERING YOUR STREAM</p>
</div>
</div>
</div>
</div>
</div>
<!-- Micro-interactions Script -->
<script>
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.classList.add('scale-[1.01]');
                input.parentElement.parentElement.classList.add('transition-transform');
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>
