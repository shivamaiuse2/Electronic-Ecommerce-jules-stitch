<!-- Visual Polish: Floating Particles -->
<div class="fixed inset-0 pointer-events-none z-0 opacity-20" id="particles-container"></div>
<script>
        // Simple ambient particle animation
        const container = document.getElementById('particles-container');
        const particleCount = 15;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'absolute bg-primary rounded-full opacity-40';

            const size = Math.random() * 4 + 2;
            const startX = Math.random() * 100;
            const startY = Math.random() * 100;
            const duration = Math.random() * 20 + 10;
            const delay = Math.random() * 5;

            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${startX}%`;
            particle.style.top = `${startY}%`;
            particle.style.filter = 'blur(1px)';

            particle.animate([
                { transform: 'translate(0, 0)', opacity: 0.2 },
                { transform: `translate(${Math.random() * 100 - 50}px, ${Math.random() * 100 - 50}px)`, opacity: 0.5 },
                { transform: 'translate(0, 0)', opacity: 0.2 }
            ], {
                duration: duration * 1000,
                iterations: Infinity,
                delay: delay * 1000,
                easing: 'ease-in-out'
            });

            container.appendChild(particle);
        }

        // Micro-interaction: Focus effects for inputs
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.closest('.glass-container').style.boxShadow = '0 0 40px rgba(92, 222, 148, 0.05)';
            });
            input.addEventListener('blur', () => {
                input.closest('.glass-container').style.boxShadow = '';
            });
        });
    </script>
